name: checks

on:
  push:
  pull_request:

jobs:
  scripts:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check shell syntax
        run: bash -n install.sh rollback.sh diagnose.sh scripts/build-release.sh
      - name: Check Python syntax
        run: python3 -m py_compile scripts/*.py
      - name: Ensure no forbidden binaries are tracked
        run: |
          if find . -type f \( -iname 'Ascension.exe' -o -iname 'MMgr64.exe' -o -iname 'DivxDecoderOriginal.dll' \) | grep -q .; then
            exit 1
          fi
