name: checks

on:
  push:
  pull_request:

jobs:
  scripts:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check shell syntax
        run: bash -n bootstrap.sh install.sh uninstall.sh rollback.sh diagnose.sh scripts/audit-runner.sh scripts/build-release.sh scripts/build-dmg.sh packaging/launch.sh
      - name: Check Python syntax
        run: python3 -m py_compile scripts/*.py
      - name: Ensure no forbidden binaries are tracked
        run: |
          if git ls-files | grep -Ei '(^|/)(ascension-setup[.]exe|Ascension[.]exe|MMgr64[.]exe|DivxDecoderOriginal[.]dll)$'; then
            exit 1
          fi
